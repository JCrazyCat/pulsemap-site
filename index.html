<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PulseMap — Real-time busyness for the places you care about</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #0f1830 0%, #050608 70%);
      color: #ffffff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }
    main { max-width: 560px; text-align: center; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #22d3ee;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 211, 238, 0.10);
      border: 1px solid rgba(34, 211, 238, 0.30);
      margin-bottom: 22px;
    }
    h1 {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 800;
      line-height: 1.1;
      margin: 0 0 16px;
    }
    p.lede {
      font-size: 17px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.65);
      margin: 0 0 36px;
    }
    nav { margin-top: 28px; font-size: 14px; }
    nav a {
      color: rgba(255, 255, 255, 0.75);
      margin: 0 12px;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      padding-bottom: 1px;
    }
    nav a:hover { color: #22d3ee; border-color: #22d3ee; }
    footer {
      margin-top: 60px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.40);
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">PULSEMAP</div>
    <h1>Know where the energy is.</h1>
    <p class="lede">Real-time busyness scores for the places you care about. Available on the App Store.</p>
    <nav>
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Use</a>
      <a href="mailto:support@pulsemapapp.com">Support</a>
    </nav>
    <footer>© 2026 PulseMap</footer>
  </main>
</body>
</html>
